<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes, ou simplesmente aumente ou diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(min-width: 300px)" srcset="imagem-pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagem-media.png" type="image/png">
        <img src="imagem-grande.png" alt="Imagem Flexível">
    </picture>
</body>
</html>
